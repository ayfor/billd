<!-- @dsCard group="Components" viewport="700x210" name="Progress bars" subtitle="Pixelated stepped bars — Seaweed under, calm Amethyst over" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; max-width: 560px; }
  .item { display: grid; grid-template-columns: 120px 1fr 120px; gap: 14px; align-items: center; }
  .name { font-size: 13px; color: var(--text-body); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ProgressBar, Money } = window.BilldDesignSystem_9669dd;
function Row({ name, value, max, tone }) {
  return (
    <div className="item">
      <span className="name">{name}</span>
      <ProgressBar value={value} max={max} tone={tone} />
      <Money cents={value} tone={value > max ? 'attention' : 'positive'} />
    </div>
  );
}
function Demo() {
  return (
    <div className="stack">
      <Row name="Groceries" value={61240} max={70000} />
      <Row name="Dining out" value={38910} max={30000} />
      <Row name="Transit" value={14800} max={20000} tone="interactive" />
      <Row name="Hobbies" value={23195} max={25000} tone="interactive" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
