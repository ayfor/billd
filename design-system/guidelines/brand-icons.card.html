<!-- @dsCard group="Brand" viewport="700x190" name="Pixel icon set" subtitle="16×16 grid icons — nav, actions, categories" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 16px; }
  .i { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  img { width: 24px; height: 24px; image-rendering: pixelated; }
  span { font-size: 9px; color: var(--text-faint); text-align: center; }
</style>
</head>
<body>
<div class="grid" id="g"></div>
<script>
  const names = ["nav_dashboard","nav_expenses","nav_budgets","nav_projections","plus","search","calendar","close","check","chevron_down","arrow_up","arrow_down","command","settings","cat_groceries","cat_dining","cat_transit","cat_hobbies","cat_rent"];
  document.getElementById('g').innerHTML = names.map(n =>
    `<div class="i"><img src="../assets/icons/${n}.svg"><span>${n.replace('nav_','').replace('cat_','')}</span></div>`
  ).join('');
</script>
</body>
</html>
