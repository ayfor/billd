<!-- @dsCard group="Type" viewport="700x200" name="Type scale" subtitle="Modern sans ramp — 2xs → xl" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
  .line { display: flex; align-items: baseline; gap: 16px; color: var(--text-primary); }
  .tok { font-size: 11px; color: var(--text-faint); width: 130px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="line"><span class="tok">--text-xl · 20</span><span style="font-size:20px">Section header</span></div>
<div class="line"><span class="tok">--text-lg · 17</span><span style="font-size:17px">Card title / lead</span></div>
<div class="line"><span class="tok">--text-md · 15</span><span style="font-size:15px">Default body text</span></div>
<div class="line"><span class="tok">--text-sm · 13</span><span style="font-size:13px">Table cell / secondary</span></div>
<div class="line"><span class="tok">--text-xs · 12</span><span style="font-size:12px">Caption / pill text</span></div>
<div class="line"><span class="tok">--text-2xs · 11</span><span style="font-size:11px">Micro label</span></div>
</body>
</html>
