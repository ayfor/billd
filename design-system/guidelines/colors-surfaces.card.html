<!-- @dsCard group="Colors" viewport="700x150" name="Surface & text ladder" subtitle="Cards barely lift; foreground is lavender at descending opacity" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; display: flex; gap: 28px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .glabel { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin-bottom: 4px; }
  .surf { display: flex; gap: 10px; }
  .box { width: 70px; height: 48px; border: var(--border-px) solid var(--border-strong); display: flex; align-items: flex-end; padding: 4px; font-size: 10px; color: var(--text-muted); }
  .tline { font-size: 15px; }
</style>
</head>
<body>
<div class="group">
  <span class="glabel">Surfaces</span>
  <div class="surf">
    <div class="box" style="background:var(--surface-sunk)">sunk</div>
    <div class="box" style="background:var(--canvas)">canvas</div>
    <div class="box" style="background:var(--surface-card)">card</div>
    <div class="box" style="background:var(--surface-raised)">raised</div>
  </div>
</div>
<div class="group">
  <span class="glabel">Text on canvas</span>
  <span class="tline" style="color:var(--text-primary)">Primary — headings &amp; money</span>
  <span class="tline" style="color:var(--text-body)">Body — paragraphs and cells</span>
  <span class="tline" style="color:var(--text-muted)">Muted — labels &amp; captions</span>
  <span class="tline" style="color:var(--text-faint)">Faint — hints &amp; placeholders</span>
</div>
</body>
</html>
