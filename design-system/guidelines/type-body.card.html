<!-- @dsCard group="Type" viewport="700x210" name="Modern sans — Inter" subtitle="Body, labels, tables, inputs — crisp and calm" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 10px; max-width: 600px; }
  .meta { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); }
  .lead { font-size: 17px; color: var(--text-primary); font-weight: 600; }
  .body { font-size: 15px; color: var(--text-body); line-height: 1.55; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--text-muted); font-weight: 600; }
</style>
</head>
<body>
<span class="meta">Lead · 17px / 600</span>
<span class="lead">You've spent $1,842.57 of $2,400.00 this month.</span>
<span class="meta">Body · 15px / 400</span>
<span class="body">Dining out is $89.10 over budget. Everything else is on track — Rent posts on the 1st. The numbers do the talking; billd never scolds.</span>
<span class="meta">Eyebrow label · 11px / 600 / uppercase</span>
<span class="label">Left to spend</span>
</body>
</html>
