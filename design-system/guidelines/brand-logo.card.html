<!-- @dsCard group="Brand" viewport="700x160" name="Logo & wordmark" subtitle="Sapphire pixel chip + bitmap wordmark" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .mark { width: 44px; height: 44px; image-rendering: pixelated; }
  .word { font-family: var(--font-pixel); font-size: 30px; color: var(--text-primary); letter-spacing: var(--tracking-pixel); }
  .word .d { color: var(--interactive); }
  .markonly { width: 64px; height: 64px; image-rendering: pixelated; }
  .note { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); }
  .col { display: flex; flex-direction: column; gap: 10px; align-items: center; }
</style>
</head>
<body>
<div class="col"><div class="lockup"><img class="mark" src="../assets/logo-mark.svg" /><span class="word">bill<span class="d">d</span></span></div><span class="note">Primary lockup</span></div>
<div class="col"><img class="markonly" src="../assets/logo-mark.svg" /><span class="note">Mark</span></div>
</body>
</html>
