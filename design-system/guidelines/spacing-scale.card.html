<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px pixel grid · 8px working unit" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .bar { background: var(--interactive); }
  .tok { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="item"><div class="bar" style="width:4px;height:4px"></div><span class="tok">1·4</span></div>
<div class="item"><div class="bar" style="width:8px;height:8px"></div><span class="tok">2·8</span></div>
<div class="item"><div class="bar" style="width:12px;height:12px"></div><span class="tok">3·12</span></div>
<div class="item"><div class="bar" style="width:16px;height:16px"></div><span class="tok">4·16</span></div>
<div class="item"><div class="bar" style="width:24px;height:24px"></div><span class="tok">6·24</span></div>
<div class="item"><div class="bar" style="width:32px;height:32px"></div><span class="tok">8·32</span></div>
<div class="item"><div class="bar" style="width:48px;height:48px"></div><span class="tok">12·48</span></div>
<div class="item"><div class="bar" style="width:64px;height:64px"></div><span class="tok">16·64</span></div>
</body>
</html>
